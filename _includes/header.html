<script>
    const url = "https://script.google.com/macros/s/AKfycbxkzEqWv8vVUqpy-XBXJpj9pbKHuMKn2ndRSaPZ9aaJkizuFRcVSQjTTfBQWbW6nXv05Q/exec";

    async function getData(d) {
        let data = "?";
        for (i in d) {
            data += `&${i}=${d[i]}`
        }
        try {
            const response = await fetch(url + data);
            const response_text = JSON.parse(await response.text());
            if (!!response_text.error) {
                throw new Error(`レスポンスステータス: ${response_text.error}`);
            }
            return response_text
        } catch (error) {
            return false
        }
    }

    async function postData(d) {
        try {
            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(d)
            });

            if (!response.ok) {
                throw new Error(`レスポンスステータス: ${response.status}`);
            }
            return true
        } catch (error) {
            return false
        }
    }
    function ge(id) {
        return document.getElementById(id)
    }
</script>
